<!DOCTYPE html>
<html>
<head>
  <title>Nasa Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #020617;
      color: white;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    .logo {
      font-weight: bold;
      font-size: 18px;
    }

    .hero {
      padding: 40px 20px;
      text-align: center;
      background: linear-gradient(to right, #22c55e, #16a34a);
    }

    .hero h1 {
      margin: 0;
    }

    .container {
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .game {
      background: #1e293b;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.2s;
    }

    .game:hover {
      transform: scale(1.05);
    }

    .game img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .game-title {
      padding: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="navbar">
  <div class="logo">🚀 NASA STORE</div>
  <div>Login</div>
</div>

<div class="hero">
  <h1>Topup Game Termurah ⚡</h1>
  <p>Proses cepat & aman</p>
</div>

<div class="container">
  <h3>Pilih Game</h3>

  <div class="grid">

    <div class="game" onclick="go('ff')">
      <img src="https://i.ibb.co/0jqHpnp/ff.jpg">
      <div class="game-title">Free Fire</div>
    </div>

    <div class="game" onclick="go('ml')">
      <img src="https://i.ibb.co/ZYW3VTp/ml.jpg">
      <div class="game-title">Mobile Legends</div>
    </div>

  </div>
</div>

<script>
function go(game){
  window.location.href = game + ".html";
}
</script>

</body>
</html>
